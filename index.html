<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>물과 에탄올 혼합물 분리 (증류)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f3f4f6; touch-action: none; /* Prevent scroll on drag */ }
        .canvas-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; background: #ffffff; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); overflow: hidden; touch-action: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 퀴즈 데이터 ---
        const QUIZ_POOL = [
            { q: "물과 에탄올 혼합물을 가열하면 끓는점이 낮은 에탄올이 먼저 끓어 나온다.", a: "O" },
            { q: "에탄올이 끓을 때 온도는 정확히 78℃에서 변함없이 일정하게 유지된다.", a: "X" }, 
            { q: "첫 번째로 모은 액체에는 순수한 에탄올만 들어있다.", a: "X" }, 
            { q: "끓는점 차이를 이용하여 액체 혼합물을 분리하는 방법을 증류라고 한다.", a: "O" },
            { q: "물이 끓을 때 상태 변화는 액체에서 기체로 변하는 기화이다.", a: "O" },
            { q: "기화된 에탄올 기체가 찬물이 담긴 비커를 지나면 액화되어 다시 액체로 변한다.", a: "O" },
            { q: "물과 에탄올은 서로 잘 섞이지 않기 때문에 밀도 차이를 이용하여 분리해야 한다.", a: "X" }, 
            { q: "가열 후반부(마지막 시험관)에 모인 액체는 주로 물이다.", a: "O" },
            { q: "가열 곡선에서 온도가 수평하게 유지되는 구간은 물질의 상태 변화가 일어나는 구간이다.", a: "O" },
            { q: "플라스크에 끓임쪽을 넣는 이유는 액체가 갑자기 끓어 넘치는 것을 막기 위해서이다.", a: "O" }
        ];

        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 500;
        const ORIGIN_X = { tube1: 630, tube2: 700, tube3: 770 };

        // 초기 입자 생성
        const generateFlaskParticles = () => {
            let p = [];
            for(let i=0; i<40; i++) p.push({type: 'ethanol', r: Math.random(), th: Math.random()*Math.PI*2});
            for(let i=0; i<160; i++) p.push({type: 'water', r: Math.random(), th: Math.random()*Math.PI*2});
            return p.sort(() => Math.random() - 0.5); 
        };

        const App = () => {
            // 시뮬레이션 상태
            const [powerOn, setPowerOn] = useState(false);
            const [isAuto, setIsAuto] = useState(false);
            const [speed, setSpeed] = useState(1); // 배속 상태 추가
            const [time, setTime] = useState(0); 
            const [temp, setTemp] = useState(20); 
            const [history, setHistory] = useState([{time: 0, temp: 20}]);
            
            // 모달 및 설정
            const [showQuizModal, setShowQuizModal] = useState(false);
            const [showTeacherModal, setShowTeacherModal] = useState(false);
            const [showGraphModal, setShowGraphModal] = useState(false); 
            const [alertData, setAlertData] = useState(null); 
            const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('distillation_api_url') || 'https://script.google.com/macros/s/AKfycbx54Gc9yL1OM_h1Jy0vYYPKVEHj5gOEX9Zl9YOXIz6Px3PgzmDh5d7QDL_l3HehN-w/exec');

            // Refs
            const canvasRef = useRef(null);
            const requestRef = useRef();
            const stateRef = useRef({
                powerOn: false,
                isAuto: false,
                speed: 1,
                time: 0,
                temp: 20,
                ethanolVol: 40,
                waterVol: 160,
                tube1Content: { ethanol: 0, water: 0 },
                tube2Content: { ethanol: 0, water: 0 },
                tube3Content: { ethanol: 0, water: 0 },
                activeTubeId: null,
                tubes: {
                    tube1: { id: 'tube1', x: ORIGIN_X.tube1, y: 350, isDragging: false },
                    tube2: { id: 'tube2', x: ORIGIN_X.tube2, y: 350, isDragging: false },
                    tube3: { id: 'tube3', x: ORIGIN_X.tube3, y: 350, isDragging: false }
                },
                particles: [], 
                flaskParticles: generateFlaskParticles(), 
                lastHistoryTime: 0,
                history: [{time: 0, temp: 20}],
                isOverflowed: false,
                vaporAccumulator: 0
            });

            const showAlert = (message, isFail = false, onClose = null) => {
                setAlertData({ message, isFail, onClose });
            };

            const resetSimulation = () => {
                setPowerOn(false);
                setIsAuto(false);
                setSpeed(1);
                setTime(0);
                setTemp(20);
                setHistory([{time: 0, temp: 20}]);
                stateRef.current = {
                    powerOn: false,
                    isAuto: false,
                    speed: 1,
                    time: 0,
                    temp: 20,
                    ethanolVol: 40,
                    waterVol: 160,
                    tube1Content: { ethanol: 0, water: 0 },
                    tube2Content: { ethanol: 0, water: 0 },
                    tube3Content: { ethanol: 0, water: 0 },
                    activeTubeId: null,
                    tubes: {
                        tube1: { id: 'tube1', x: ORIGIN_X.tube1, y: 350, isDragging: false },
                        tube2: { id: 'tube2', x: ORIGIN_X.tube2, y: 350, isDragging: false },
                        tube3: { id: 'tube3', x: ORIGIN_X.tube3, y: 350, isDragging: false }
                    },
                    particles: [],
                    flaskParticles: generateFlaskParticles(),
                    lastHistoryTime: 0,
                    history: [{time: 0, temp: 20}],
                    isOverflowed: false,
                    vaporAccumulator: 0
                };
                if(canvasRef.current) draw(canvasRef.current.getContext('2d'), stateRef.current);
            };

            useEffect(() => {
                stateRef.current.powerOn = powerOn;
                stateRef.current.isAuto = isAuto;
                stateRef.current.speed = speed;
            }, [powerOn, isAuto, speed]);

            // --- 시뮬레이션 핵심 루프 ---
            const updateAndDraw = useCallback(() => {
                const state = stateRef.current;
                const ctx = canvasRef.current.getContext('2d');

                if (state.powerOn) {
                    // --- 시뮬레이션 자동 종료 조건 ---
                    if (state.time >= 120) {
                        state.powerOn = false;
                        setPowerOn(false);
                        setTimeout(() => {
                            showAlert("설정된 최대 가열 시간(120분)에 도달하여 가열이 자동 종료되었습니다.\n오른쪽 패널에서 평가를 진행해 주세요.");
                        }, 50);
                    } else if (state.ethanolVol <= 0 && state.waterVol <= 0 && state.particles.length === 0) {
                        state.powerOn = false;
                        setPowerOn(false);
                        setTimeout(() => {
                            showAlert("플라스크 안의 액체가 모두 증발하여 가열이 자동 종료되었습니다.\n오른쪽 패널에서 평가를 진행해 주세요.");
                        }, 50);
                    } else {
                        // 전체 시간 흐름
                        const spd = state.speed;
                        state.time += 0.002 * spd; 
                        
                        let tempIncrease = 0;
                        let boilEthanolRate = 0;
                        let boilWaterRate = 0;

                        if (state.temp < 78) {
                            tempIncrease = 0.01 * spd; // 초기 가열
                        } else if (state.temp >= 78 && state.ethanolVol > 0) {
                            tempIncrease = 0.0005 * spd; // 에탄올 끓음 구간 대폭 연장 (온도 거의 정체)
                            boilEthanolRate = Math.min(0.005 * spd, state.ethanolVol); // 증발 속도도 낮춤
                            boilWaterRate = 0.0005 * spd; 
                        } else if (state.ethanolVol <= 0 && state.temp < 100) {
                            tempIncrease = 0.004 * spd; // 78 -> 100 상승 속도도 대폭 감소 (천천히 오름)
                            boilWaterRate = 0.001 * spd; 
                        } else if (state.temp >= 100 && state.waterVol > 0) {
                            tempIncrease = 0; // 물 끓음 구간 정체
                            boilWaterRate = Math.min(0.01 * spd, state.waterVol);
                        }

                        state.temp = Math.min(120, state.temp + tempIncrease);
                        state.ethanolVol = Math.max(0, state.ethanolVol - boilEthanolRate);
                        state.waterVol = Math.max(0, state.waterVol - boilWaterRate);

                        // 기체 파티클 생성
                        if (boilEthanolRate > 0 || boilWaterRate > 0) {
                            state.vaporAccumulator += (boilEthanolRate + boilWaterRate);
                            if (state.vaporAccumulator >= 0.05) { // 임계값을 낮춰 입자 빈도는 유지
                                const ratio = boilEthanolRate / (boilEthanolRate + boilWaterRate);
                                const isEthanol = Math.random() < ratio;
                                state.particles.push({
                                    startX: 180 + Math.random() * 80, 
                                    startY: 390 - Math.random() * 10,
                                    type: isEthanol ? 'ethanol' : 'water',
                                    progress: 0,
                                    vol: state.vaporAccumulator * 0.9 
                                });
                                state.vaporAccumulator = 0;
                            }
                        }

                        // 히스토리 기록 (0.1분 단위)
                        if (state.time - state.lastHistoryTime >= 0.1) {
                            state.history.push({ time: state.time, temp: state.temp });
                            state.lastHistoryTime = state.time;
                            setTime(state.time);
                            setTemp(state.temp);
                            setHistory([...state.history]);
                        }

                        // 자동 모드: 온도 구간별 3단계 교체
                        if (state.isAuto) {
                            const setTubeAuto = (newId) => {
                                if (state.activeTubeId !== newId) {
                                    if (state.activeTubeId) {
                                        state.tubes[state.activeTubeId].x = ORIGIN_X[state.activeTubeId];
                                        state.tubes[state.activeTubeId].y = 350;
                                    }
                                    state.tubes[newId].x = 550;
                                    state.tubes[newId].y = 350;
                                    state.activeTubeId = newId;
                                }
                            };

                            if (state.temp >= 20 && state.temp < 80) setTubeAuto('tube1');
                            else if (state.temp >= 80 && state.temp < 98) setTubeAuto('tube2');
                            else if (state.temp >= 98) setTubeAuto('tube3');
                        }
                    }
                }

                // 이동하는 기체 파티클 로직
                const particleSpd = state.speed;
                state.particles.forEach(p => {
                    p.progress += 0.0035 * particleSpd; 
                    
                    if (p.progress < 1) { 
                        // 1. 플라스크 내 상승
                        p.x = p.startX + (245 - p.startX) * p.progress + Math.sin(p.progress * 15) * 8;
                        p.y = p.startY + (220 - p.startY) * p.progress;
                    } else if (p.progress < 2) { 
                        // 2. 고무관 이동
                        const t = p.progress - 1;
                        const endRubberX = state.activeTubeId ? state.tubes[state.activeTubeId].x : 550;
                        const endRubberY = state.activeTubeId ? state.tubes[state.activeTubeId].y - 70 : 280;
                        p.x = Math.pow(1-t, 2)*245 + 2*(1-t)*t*400 + Math.pow(t, 2)*endRubberX;
                        p.y = Math.pow(1-t, 2)*220 + 2*(1-t)*t*200 + Math.pow(t, 2)*endRubberY;
                    } else if (p.progress < 2.5) { 
                        // 3. 유리관 하강
                        const t = (p.progress - 2) * 2;
                        const endRubberX = state.activeTubeId ? state.tubes[state.activeTubeId].x : 550;
                        const endRubberY = state.activeTubeId ? state.tubes[state.activeTubeId].y - 70 : 280;
                        const glassTubeEndY = state.activeTubeId ? state.tubes[state.activeTubeId].y + 10 : 350;
                        p.x = endRubberX;
                        p.y = endRubberY + t * (glassTubeEndY - endRubberY);
                    } else if (p.progress < 3) { 
                        // 4. 시험관 바닥으로 떨어짐
                        const t = (p.progress - 2.5) * 2;
                        const targetX = state.activeTubeId ? state.tubes[state.activeTubeId].x : 550;
                        const glassTubeEndY = state.activeTubeId ? state.tubes[state.activeTubeId].y + 10 : 350;
                        p.x = targetX + Math.sin(t * 15) * 4;
                        p.y = glassTubeEndY + t * 40;
                    }

                    // 시험관 바닥에 완전히 도착했을 때 액체 채우기
                    if (p.progress >= 3 && !p.collected) {
                        p.collected = true;
                        
                        if (state.activeTubeId && !state.isOverflowed) {
                            const targetTubeContent = state[`${state.activeTubeId}Content`];
                            if (p.type === 'ethanol') targetTubeContent.ethanol += p.vol;
                            else targetTubeContent.water += p.vol;

                            // 넘침 판정
                            if ((targetTubeContent.ethanol + targetTubeContent.water) > 55) {
                                state.isOverflowed = true;
                                setPowerOn(false);
                                setTimeout(() => {
                                    showAlert("시험관이 넘쳤습니다!\n적절한 시기에 시험관을 교체해야 합니다.", true);
                                }, 100);
                            }
                        }
                    }
                });
                
                state.particles = state.particles.filter(p => !p.collected);

                draw(ctx, state);
                requestRef.current = requestAnimationFrame(updateAndDraw);
            }, []);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(updateAndDraw);
                return () => cancelAnimationFrame(requestRef.current);
            }, [updateAndDraw]);

            // --- 캔버스 그리기 ---
            const draw = (ctx, state) => {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                const setShadow = (blur, color, oy=0, ox=0) => {
                    ctx.shadowBlur = blur; ctx.shadowColor = color; ctx.shadowOffsetY = oy; ctx.shadowOffsetX = ox;
                };
                const clearShadow = () => setShadow(0, 'transparent');

                // 1. 가열기
                setShadow(15, 'rgba(0,0,0,0.15)', 8);
                ctx.fillStyle = '#f8fafc';
                if(ctx.roundRect) {
                    ctx.beginPath(); ctx.roundRect(90, 420, 280, 45, 12); ctx.fill();
                } else { ctx.fillRect(90, 420, 280, 45); }
                
                ctx.fillStyle = '#1e293b'; 
                if(ctx.roundRect) {
                    ctx.beginPath(); ctx.roundRect(110, 408, 240, 15, 6); ctx.fill();
                } else { ctx.fillRect(110, 408, 240, 15); }
                
                if (state.powerOn) {
                    setShadow(15, 'rgba(239, 68, 68, 0.8)', 0);
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath(); ctx.roundRect(130, 408, 200, 10, 4); ctx.fill();
                }
                clearShadow();

                ctx.fillStyle = '#0f172a';
                ctx.beginPath(); ctx.arc(230, 442, 16, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#475569';
                ctx.beginPath(); ctx.arc(230, 442, 10, 0, Math.PI * 2); ctx.fill();
                if (state.powerOn) {
                    ctx.fillStyle = '#fca5a5'; 
                    ctx.beginPath(); ctx.arc(280, 442, 6, 0, Math.PI * 2); ctx.fill(); 
                }
                
                ctx.fillStyle = '#334155';
                ctx.beginPath(); ctx.roundRect(110, 465, 15, 10, 3); ctx.fill();
                ctx.beginPath(); ctx.roundRect(335, 465, 15, 10, 3); ctx.fill();

                // 2. 삼각 플라스크 (내부)
                ctx.fillStyle = 'rgba(241, 245, 249, 0.4)'; 
                ctx.beginPath();
                ctx.moveTo(215, 180); ctx.lineTo(215, 240);
                ctx.lineTo(145, 395); ctx.quadraticCurveTo(140, 408, 160, 408);
                ctx.lineTo(300, 408); ctx.quadraticCurveTo(320, 408, 315, 395);
                ctx.lineTo(245, 240); ctx.lineTo(245, 180);
                ctx.fill();

                // 3. 플라스크 내부 고정 입자 (액체)
                const eCount = Math.floor(state.ethanolVol);
                const wCount = Math.floor(state.waterVol);
                const totalVol = eCount + wCount;
                
                let eDrawn = 0; let wDrawn = 0;
                const maxPileHeight = (totalVol / 200) * 45; 
                
                state.flaskParticles.forEach(p => {
                    if (p.type === 'ethanol' && eDrawn >= eCount) return;
                    if (p.type === 'water' && wDrawn >= wCount) return;

                    if (p.type === 'ethanol') eDrawn++;
                    if (p.type === 'water') wDrawn++;

                    const w = 150 - (p.r * maxPileHeight * 0.6);
                    const px = 230 + (Math.cos(p.th) * p.r * (w/2));
                    const py = 405 - (Math.abs(Math.sin(p.th)) * maxPileHeight);

                    ctx.fillStyle = p.type === 'ethanol' ? '#ef4444' : '#06b6d4'; 
                    ctx.beginPath();
                    ctx.arc(px, py, 5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                });

                // 텍스트 (온도, 경과 시간 표시)
                ctx.font = 'bold 32px sans-serif';
                ctx.fillStyle = '#334155';
                ctx.fillText(`${state.temp.toFixed(1)}°C`, 320, 180); 
                ctx.font = 'bold 20px sans-serif';
                ctx.fillStyle = '#64748b';
                ctx.fillText(`경과 시간: ${state.time.toFixed(1)} 분`, 320, 215);

                // 5. 온도계
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(228, 110, 4, 150);
                ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.roundRect(215, 30, 30, 80, 8); ctx.fill();
                ctx.fillStyle = '#0284c7'; ctx.beginPath(); ctx.roundRect(215, 75, 30, 20, 0); ctx.fill();

                // 6. 얼음물 비커
                const beakerX = 490, beakerY = 280, beakerW = 120, beakerH = 150;
                ctx.fillStyle = 'rgba(241, 245, 249, 0.4)';
                ctx.beginPath();
                ctx.moveTo(beakerX, beakerY); ctx.lineTo(beakerX, beakerY + beakerH - 10);
                ctx.quadraticCurveTo(beakerX, beakerY + beakerH, beakerX + 10, beakerY + beakerH);
                ctx.lineTo(beakerX + beakerW - 10, beakerY + beakerH);
                ctx.quadraticCurveTo(beakerX + beakerW, beakerY + beakerH, beakerX + beakerW, beakerY + beakerH - 10);
                ctx.lineTo(beakerX + beakerW, beakerY);
                ctx.fill();
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2; ctx.stroke();

                ctx.fillStyle = 'rgba(186, 230, 253, 0.5)'; 
                ctx.fillRect(beakerX + 2, beakerY + 40, beakerW - 4, beakerH - 42);
                
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                const ices = [
                    {x: 500, y: 340, a: 0.2}, {x: 550, y: 330, a: -0.1}, 
                    {x: 520, y: 370, a: 0.5}, {x: 570, y: 380, a: 0.1},
                    {x: 510, y: 400, a: -0.3}, {x: 560, y: 410, a: 0.2}
                ];
                ices.forEach(ice => {
                    ctx.save(); ctx.translate(ice.x + 15, ice.y + 15); ctx.rotate(ice.a);
                    ctx.beginPath(); ctx.roundRect(-15, -15, 30, 30, 5); ctx.fill(); ctx.stroke(); ctx.restore();
                });

                // 6.5 유리관 그리기
                const endRubberX = state.activeTubeId ? state.tubes[state.activeTubeId].x : 550;
                const endRubberY = state.activeTubeId ? state.tubes[state.activeTubeId].y - 70 : 280;
                const glassTubeEndY = state.activeTubeId ? state.tubes[state.activeTubeId].y + 10 : 350;

                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 8; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(endRubberX, endRubberY - 5); ctx.lineTo(endRubberX, glassTubeEndY); ctx.stroke();
                
                ctx.strokeStyle = 'rgba(241, 245, 249, 0.8)'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(endRubberX, endRubberY - 5); ctx.lineTo(endRubberX, glassTubeEndY - 2); ctx.stroke();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(endRubberX - 2, endRubberY); ctx.lineTo(endRubberX - 2, glassTubeEndY - 2); ctx.stroke();

                // 7. 시험관 렌더링 (3개)
                const drawTube = (tubeState, content) => {
                    ctx.save();
                    ctx.translate(tubeState.x, tubeState.y);
                    
                    const eLvl = content.ethanol;
                    const wLvl = content.water;
                    const tot = eLvl + wLvl;
                    if (tot > 0) {
                        const eRatio = eLvl / tot;
                        const wRatio = wLvl / tot;
                        const r = Math.round(239 * eRatio + 6 * wRatio);
                        const g = Math.round(68 * eRatio + 182 * wRatio);
                        const b = Math.round(68 * eRatio + 212 * wRatio);
                        
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.7)`;
                        const h = Math.min(110, tot * 2);
                        ctx.beginPath();
                        ctx.moveTo(-13, 60 - h); ctx.lineTo(-13, 50);
                        ctx.arc(0, 50, 13, Math.PI, 0, true);
                        ctx.lineTo(13, 60 - h); ctx.fill();
                    }

                    ctx.strokeStyle = tubeState.isDragging ? '#ef4444' : '#64748b';
                    ctx.lineWidth = 2;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.moveTo(-15, -60); ctx.lineTo(-15, 50);
                    ctx.arc(0, 50, 15, Math.PI, 0, true);
                    ctx.lineTo(15, -60);
                    ctx.stroke(); ctx.fill();
                    ctx.restore();
                };
                
                drawTube(state.tubes.tube1, state.tube1Content);
                drawTube(state.tubes.tube2, state.tube2Content);
                drawTube(state.tubes.tube3, state.tube3Content);

                // 8. 파티클
                state.particles.forEach(p => {
                    ctx.fillStyle = p.type === 'ethanol' ? '#ef4444' : '#06b6d4';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2); ctx.fill();
                });

                // 9. 플라스크 외곽선 및 고무관
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(215, 180); ctx.lineTo(215, 240); ctx.lineTo(145, 395); ctx.quadraticCurveTo(140, 408, 160, 408);
                ctx.lineTo(300, 408); ctx.quadraticCurveTo(320, 408, 315, 395); ctx.lineTo(245, 240); ctx.lineTo(245, 180);
                ctx.stroke();
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2; ctx.stroke();

                ctx.strokeStyle = '#e5d5b5'; ctx.lineWidth = 12; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(245, 220); ctx.quadraticCurveTo(400, 200, endRubberX, endRubberY); ctx.stroke();
                
                ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(245, 220); ctx.quadraticCurveTo(400, 200, endRubberX, endRubberY); ctx.stroke();

                ctx.fillStyle = '#f8fafc'; ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(205, 160, 50, 22, 3); ctx.fill(); ctx.stroke();

                // 타겟 영역
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)'; ctx.setLineDash([5, 5]);
                ctx.strokeRect(520, 270, 60, 160); ctx.setLineDash([]);
                ctx.fillStyle = '#64748b'; ctx.font = '12px sans-serif'; ctx.fillText('여기로 드래그', 515, 260);

                // 범례
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(660, 50, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ef4444'; ctx.font = 'bold 18px sans-serif'; ctx.fillText('에탄올', 680, 56);
                ctx.fillStyle = '#06b6d4'; ctx.beginPath(); ctx.arc(660, 80, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#06b6d4'; ctx.fillText('물', 680, 86);
                ctx.fillStyle = '#94a3b8'; ctx.font = '12px sans-serif'; ctx.fillText('입자의 색은 구분을 위한 것으로', 640, 110);
                ctx.fillText('실제로는 무색임', 640, 125);
            };

            // --- 드래그 앤 드롭 ---
            const getPointerPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scaleX = CANVAS_WIDTH / rect.width;
                const scaleY = CANVAS_HEIGHT / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            };

            const handlePointerDown = (e) => {
                if(stateRef.current.isAuto) return; 
                const pos = getPointerPos(e);
                ['tube1', 'tube2', 'tube3'].forEach(id => {
                    const tube = stateRef.current.tubes[id];
                    if (Math.abs(pos.x - tube.x) < 30 && Math.abs(pos.y - tube.y) < 80) tube.isDragging = true;
                });
            };

            const handlePointerMove = (e) => {
                const pos = getPointerPos(e);
                let draggingAny = false;
                ['tube1', 'tube2', 'tube3'].forEach(id => {
                    if (stateRef.current.tubes[id].isDragging) {
                        stateRef.current.tubes[id].x = pos.x; stateRef.current.tubes[id].y = pos.y;
                        draggingAny = true;
                    }
                });
                if(draggingAny) e.preventDefault();
            };

            const handlePointerUp = () => {
                const state = stateRef.current;
                const dropZoneX = 550, dropZoneY = 350;

                ['tube1', 'tube2', 'tube3'].forEach(id => {
                    const tube = state.tubes[id];
                    if (tube.isDragging) {
                        tube.isDragging = false;
                        if (Math.abs(tube.x - dropZoneX) < 50 && Math.abs(tube.y - dropZoneY) < 80) {
                            if (state.activeTubeId && state.activeTubeId !== id) {
                                state.tubes[state.activeTubeId].x = ORIGIN_X[state.activeTubeId];
                                state.tubes[state.activeTubeId].y = 350;
                            }
                            tube.x = dropZoneX; tube.y = dropZoneY;
                            state.activeTubeId = id;
                        } else {
                            tube.x = ORIGIN_X[id]; tube.y = 350;
                            if (state.activeTubeId === id) state.activeTubeId = null;
                        }
                    }
                });
            };

            // --- 제출 및 검증 ---
            const handleEvaluateClick = () => {
                if(!apiUrl) {
                    showAlert("API 주소가 설정되지 않았습니다.\n교사용 가이드를 확인하여 시트를 연동해 주세요.", false);
                    return;
                }
                
                // 3개 시험관 총합
                const collectedVol = stateRef.current.tube1Content.ethanol + stateRef.current.tube1Content.water +
                                     stateRef.current.tube2Content.ethanol + stateRef.current.tube2Content.water +
                                     stateRef.current.tube3Content.ethanol + stateRef.current.tube3Content.water;
                
                if (collectedVol < 30) {
                    showAlert("분리한 액체의 양이 너무 적어요.\n실험에 실패했습니다.", true);
                } else {
                    showAlert("성공적으로 액체를 분리했습니다!\n이제 실험 평가를 진행합니다.", false, () => setShowQuizModal(true));
                }
            };

            // 상태 배지 텍스트/색상 결정
            let currentStatusText = "⏹️ 대기/종료";
            let currentStatusColor = "bg-slate-100 text-slate-600 border-slate-200";
            if (powerOn) {
                if (temp < 78) { currentStatusText = "🔥 가열 중"; currentStatusColor = "bg-orange-100 text-orange-700 border-orange-200"; }
                else if (temp >= 78 && stateRef.current.ethanolVol > 0) { currentStatusText = "💧 에탄올 끓는 중"; currentStatusColor = "bg-red-100 text-red-700 border-red-200"; }
                else if (stateRef.current.ethanolVol <= 0 && temp < 100) { currentStatusText = "🔥 온도 상승 중"; currentStatusColor = "bg-orange-100 text-orange-700 border-orange-200"; }
                else if (temp >= 100 && stateRef.current.waterVol > 0) { currentStatusText = "💦 물 끓는 중"; currentStatusColor = "bg-cyan-100 text-cyan-700 border-cyan-200"; }
            }

            return (
                <div className="min-h-screen p-4 pb-20 flex flex-col items-center">
                    <header className="w-full max-w-5xl flex justify-between items-center mb-6">
                        <h1 className="text-3xl font-bold text-gray-800 tracking-tight">💧 증류 시뮬레이션</h1>
                        <button 
                            onClick={() => setShowTeacherModal(true)}
                            className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-md shadow-sm text-sm font-medium transition"
                        >
                            ⚙️ 교사용 가이드
                        </button>
                    </header>

                    <div className="w-full max-w-5xl flex flex-col lg:flex-row gap-6">
                        <div className="flex-1 flex flex-col items-center bg-white rounded-xl shadow-lg p-4">
                            <canvas 
                                ref={canvasRef}
                                width={CANVAS_WIDTH}
                                height={CANVAS_HEIGHT}
                                className="canvas-container cursor-pointer"
                                onPointerDown={handlePointerDown}
                                onPointerMove={handlePointerMove}
                                onPointerUp={handlePointerUp}
                                onPointerLeave={handlePointerUp}
                            ></canvas>

                            <div className="mt-6 flex flex-wrap gap-4 w-full justify-center items-center">
                                <button 
                                    onClick={() => setPowerOn(!powerOn)}
                                    className={`px-8 py-3 rounded-full font-bold text-white shadow-md transition transform hover:scale-105 ${powerOn ? 'bg-red-500 hover:bg-red-600' : 'bg-slate-800 hover:bg-slate-900'}`}
                                >
                                    {powerOn ? '■ 가열 중지' : '▶ 가열 시작'}
                                </button>
                                
                                <label className="flex items-center gap-2 cursor-pointer bg-slate-100 px-5 py-3 rounded-full border border-slate-300 hover:bg-slate-200 transition">
                                    <input 
                                        type="checkbox" 
                                        checked={isAuto} 
                                        onChange={(e) => setIsAuto(e.target.checked)}
                                        className="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                                    />
                                    <span className="font-medium text-slate-700">자동 시험관 교체</span>
                                </label>

                                {/* 배속 컨트롤 */}
                                <div className="flex bg-slate-200 rounded-full p-1 border border-slate-300">
                                    {[1, 2, 5].map(s => (
                                        <button
                                            key={s}
                                            onClick={() => setSpeed(s)}
                                            className={`px-4 py-2 text-sm font-bold rounded-full transition ${speed === s ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                        >
                                            x{s}
                                        </button>
                                    ))}
                                </div>

                                <button 
                                    onClick={resetSimulation}
                                    className="px-6 py-3 rounded-full font-bold text-slate-700 bg-slate-200 hover:bg-slate-300 shadow-md transition"
                                >
                                    초기화
                                </button>
                            </div>
                        </div>

                        <div className="w-full lg:w-80 flex flex-col gap-4">
                            {/* 연속적인 선 그래프 */}
                            <div className="bg-white p-5 pb-10 mb-12 rounded-xl shadow-lg border border-slate-100 h-80 flex flex-col">
                                <div className="flex flex-wrap justify-between items-center gap-2 mb-4">
                                    <div className="flex items-center gap-2">
                                        <h3 className="font-bold text-slate-800 text-lg">온도 변화 그래프</h3>
                                        <span className={`text-[10px] px-2 py-1 rounded-full font-bold border shadow-sm ${currentStatusColor}`}>{currentStatusText}</span>
                                    </div>
                                    <button 
                                        onClick={() => setShowGraphModal(true)}
                                        className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 px-3 py-1 rounded-md text-sm font-bold shadow-sm transition whitespace-nowrap"
                                    >
                                        🔍 그래프 확대
                                    </button>
                                </div>
                                <div className="flex-1 relative w-full border-l-2 border-b-2 border-slate-300 ml-6 mb-4">
                                    {[0, 20, 40, 60, 80, 100, 120, 140].map(val => (
                                        <div key={val} className="absolute -left-7 text-xs text-slate-500 text-right w-6" style={{bottom: `${(val/140)*100}%`, transform: 'translateY(50%)'}}>{val}</div>
                                    ))}
                                    {[20, 40, 60, 80, 100, 120].map(val => (
                                        <div key={val} className="absolute w-full border-t border-slate-100" style={{bottom: `${(val/140)*100}%`}}></div>
                                    ))}
                                    <div className="absolute w-full border-t border-dashed border-red-300" style={{bottom: `${(78/140)*100}%`}}>
                                        <span className="absolute -top-4 right-1 text-[10px] text-red-500 font-bold bg-white/90 px-1 rounded">에탄올 끓는점 (78℃)</span>
                                    </div>
                                    <div className="absolute w-full border-t border-dashed border-blue-300" style={{bottom: `${(100/140)*100}%`}}>
                                        <span className="absolute -top-4 right-1 text-[10px] text-blue-500 font-bold bg-white/90 px-1 rounded">물 끓는점 (100℃)</span>
                                    </div>

                                    <svg className="absolute inset-0 w-full h-full overflow-visible" preserveAspectRatio="none">
                                        <polyline 
                                            fill="none" 
                                            stroke="#b91c1c" 
                                            strokeWidth="3"
                                            strokeLinejoin="round"
                                            strokeLinecap="round"
                                            points={history.map(h => `${(h.time / 120) * 100}%,${100 - (h.temp / 140) * 100}%`).join(' ')}
                                        />
                                        {/* 일정 간격으로 데이터 포인트(점) 그리기 */}
                                        {history.filter((_, i) => i % 15 === 0).map((h, idx) => (
                                            <circle 
                                                key={idx} 
                                                cx={`${(h.time / 120) * 100}%`} 
                                                cy={`${100 - (h.temp / 140) * 100}%`} 
                                                r="3.5" 
                                                fill="#b91c1c" 
                                            />
                                        ))}
                                        {/* 현재 마커 */}
                                        {history.length > 0 && (
                                            <circle cx={`${(history[history.length-1].time / 120) * 100}%`} cy={`${100 - (history[history.length-1].temp / 140) * 100}%`} r="5" fill="#ef4444" stroke="#fff" strokeWidth="2" />
                                        )}
                                    </svg>
                                </div>
                                <div className="text-center text-sm font-medium text-slate-600">시간</div>
                            </div>

                            <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-6 rounded-xl shadow-lg border border-blue-100 flex-1 flex flex-col justify-center">
                                <h3 className="font-bold text-blue-900 text-xl mb-3 text-center">실험 평가</h3>
                                <p className="text-sm text-blue-700 mb-6 text-center leading-relaxed">
                                    가열이 완료되고 그래프 모양을 충분히 관찰했다면, 아래 버튼을 눌러 평가를 진행하세요.
                                </p>
                                <button 
                                    onClick={handleEvaluateClick}
                                    className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md text-lg transition transform hover:-translate-y-1"
                                >
                                    결과 제출 및 퀴즈 풀기
                                </button>
                            </div>
                        </div>
                    </div>

                    {showQuizModal && <QuizModal onClose={() => setShowQuizModal(false)} showAlert={showAlert} apiUrl={apiUrl} simulationData={{
                        maxTemp: history.length > 0 ? Math.max(...history.map(h => h.temp)) : temp, 
                        duration: time,
                        tube1: stateRef.current.tube1Content,
                        tube2: stateRef.current.tube2Content,
                        tube3: stateRef.current.tube3Content
                    }} />}
                    {showTeacherModal && <TeacherModal onClose={() => setShowTeacherModal(false)} apiUrl={apiUrl} setApiUrl={setApiUrl} showAlert={showAlert} />}
                    {showGraphModal && <GraphModal onClose={() => setShowGraphModal(false)} history={history} />}
                    {alertData && <AlertModal message={alertData.message} isFail={alertData.isFail} onClose={() => { if(alertData.onClose) alertData.onClose(); setAlertData(null); }} />}
                </div>
            );
        };

        // --- 그래프 확대 모달 컴포넌트 ---
        const GraphModal = ({ onClose, history }) => {
            const [hoveredPoint, setHoveredPoint] = useState(null);

            const ethPoints = history.filter(h => h.temp >= 78 && h.temp < 99);
            const ethStart = ethPoints.length > 0 ? (ethPoints[0].time / 120) * 100 : null;
            const ethEnd = ethPoints.length > 0 ? (ethPoints[ethPoints.length - 1].time / 120) * 100 : null;

            const waterPoints = history.filter(h => h.temp >= 99);
            const waterStart = waterPoints.length > 0 ? (waterPoints[0].time / 120) * 100 : null;
            const waterEnd = waterPoints.length > 0 ? (waterPoints[waterPoints.length - 1].time / 120) * 100 : null;

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black bg-opacity-60 p-4 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col p-8 relative">
                        <button onClick={onClose} className="absolute top-6 right-6 text-slate-400 hover:text-slate-800 text-4xl leading-none">&times;</button>
                        <h2 className="text-2xl font-bold text-slate-800 mb-8 text-center">📈 온도 변화 상세 그래프</h2>
                        
                        <div className="relative w-full h-[60vh] border-l-2 border-b-2 border-slate-600 ml-8 mb-6 mt-4">
                            {[0, 20, 40, 60, 80, 100, 120, 140].map(val => (
                                <div key={val} className="absolute -left-12 text-sm font-bold text-slate-500 text-right w-10" style={{bottom: `${(val/140)*100}%`, transform: 'translateY(50%)'}}>{val}</div>
                            ))}
                            {[20, 40, 60, 80, 100, 120, 140].map(val => (
                                <div key={val} className="absolute w-full border-t border-slate-100" style={{bottom: `${(val/140)*100}%`}}></div>
                            ))}

                            <svg className="absolute inset-0 w-full h-full overflow-visible" preserveAspectRatio="none">
                                {ethStart !== null && ethEnd !== null && ethEnd > ethStart && (
                                    <g>
                                        <rect x={`${ethStart}%`} y={`${100 - (88/140)*100}%`} width={`${ethEnd - ethStart}%`} height={`${(20/140)*100}%`} fill="rgba(255, 99, 71, 0.15)" />
                                        <text x={`${(ethStart + ethEnd)/2}%`} y={`${100 - (92/140)*100}%`} fill="#ef4444" fontSize="16" fontWeight="bold" textAnchor="middle">에탄올 끓음 (오름현상)</text>
                                    </g>
                                )}
                                {waterStart !== null && waterEnd !== null && waterEnd > waterStart && (
                                    <g>
                                        <rect x={`${waterStart}%`} y={`${100 - (110/140)*100}%`} width={`${waterEnd - waterStart}%`} height={`${(20/140)*100}%`} fill="rgba(59, 130, 246, 0.15)" />
                                        <text x={`${(waterStart + waterEnd)/2}%`} y={`${100 - (115/140)*100}%`} fill="#3b82f6" fontSize="16" fontWeight="bold" textAnchor="middle">물 끓음</text>
                                    </g>
                                )}

                                <polyline 
                                    fill="none" 
                                    stroke="#f97316" 
                                    strokeWidth="5"
                                    strokeLinejoin="round"
                                    strokeLinecap="round"
                                    points={history.map(h => `${(h.time / 120) * 100}%,${100 - (h.temp / 140) * 100}%`).join(' ')}
                                />
                                {history.filter((_, i) => i % 15 === 0).map((h, idx) => {
                                    const cxPercent = (h.time / 120) * 100;
                                    const cyPercent = 100 - (h.temp / 140) * 100;
                                    return (
                                        <g key={idx}>
                                            <circle 
                                                cx={`${cxPercent}%`} 
                                                cy={`${cyPercent}%`} 
                                                r={hoveredPoint && hoveredPoint.time === h.time ? "7" : "5"} 
                                                fill={hoveredPoint && hoveredPoint.time === h.time ? "#ef4444" : "#f97316"} 
                                                className="transition-all duration-200"
                                            />
                                            {/* 호버 인식 영역을 넓히기 위한 투명한 원 */}
                                            <circle 
                                                cx={`${cxPercent}%`} 
                                                cy={`${cyPercent}%`} 
                                                r="15" 
                                                fill="transparent" 
                                                className="cursor-pointer"
                                                onMouseEnter={() => setHoveredPoint({ x: cxPercent, y: cyPercent, time: h.time, temp: h.temp })}
                                                onMouseLeave={() => setHoveredPoint(null)}
                                            />
                                        </g>
                                    );
                                })}
                                {history.length > 0 && (
                                    <circle cx={`${(history[history.length-1].time / 120) * 100}%`} cy={`${100 - (history[history.length-1].temp / 140) * 100}%`} r="7" fill="#ef4444" stroke="#fff" strokeWidth="2" />
                                )}
                            </svg>

                            {/* 툴팁 렌더링 */}
                            {hoveredPoint && (
                                <div 
                                    className="absolute z-50 bg-slate-800 text-white text-sm py-1.5 px-3 rounded-lg shadow-lg pointer-events-none transform -translate-x-1/2 -translate-y-full whitespace-nowrap transition-opacity"
                                    style={{ left: `${hoveredPoint.x}%`, top: `calc(${hoveredPoint.y}% - 14px)` }}
                                >
                                    <div className="font-bold text-orange-300 mb-0.5">⏱ {hoveredPoint.time.toFixed(1)} 분</div>
                                    <div className="font-bold">🌡 {hoveredPoint.temp.toFixed(1)} °C</div>
                                    {/* 툴팁 꼬리 */}
                                    <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-[6px] border-transparent border-t-slate-800"></div>
                                </div>
                            )}

                            <div className="absolute -bottom-10 left-1/2 transform -translate-x-1/2 text-slate-700 font-bold text-lg">시간 (가상 분)</div>
                            <div className="absolute -left-16 top-1/2 transform -translate-y-1/2 -rotate-90 text-slate-700 font-bold text-lg">온도 (°C)</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 퀴즈 제출용 모달 ---
        const QuizModal = ({ onClose, showAlert, apiUrl, simulationData }) => {
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [learnedText, setLearnedText] = useState('');
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState(['', '', '']);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const shuffled = [...QUIZ_POOL].sort(() => 0.5 - Math.random());
                setQuestions(shuffled.slice(0, 3));
            }, []);

            const handleSubmit = async () => {
                if (!studentId.trim() || !studentName.trim()) { showAlert("학번과 이름을 모두 입력해주세요."); return; }
                if (answers.includes('')) { showAlert("모든 퀴즈 문항(O/X)에 답해주세요."); return; }
                if (!learnedText.trim()) { showAlert("실험을 통해 알게 된 점을 작성해주세요."); return; }

                setIsSubmitting(true);
                let score = 0;
                answers.forEach((ans, idx) => { if(ans === questions[idx].a) score += 33.3; });
                score = Math.round(score);

                const payload = {
                    studentId, studentName,
                    maxTemp: simulationData.maxTemp.toFixed(1),
                    duration: simulationData.duration.toFixed(1),
                    tube1: `에:${simulationData.tube1.ethanol.toFixed(1)}/물:${simulationData.tube1.water.toFixed(1)}`,
                    tube2: `에:${simulationData.tube2.ethanol.toFixed(1)}/물:${simulationData.tube2.water.toFixed(1)}`,
                    tube3: `에:${simulationData.tube3.ethanol.toFixed(1)}/물:${simulationData.tube3.water.toFixed(1)}`,
                    quizScore: score, learnedText
                };

                try {
                    await fetch(apiUrl, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        body: JSON.stringify(payload), 
                        headers: { 'Content-Type': 'text/plain' } 
                    });
                    showAlert("성공적으로 제출되었습니다! 수고하셨습니다.", false, onClose);
                } catch (error) {
                    console.error("Submit Error:", error);
                    showAlert("네트워크 오류가 발생했습니다. 인터넷 연결을 확인하거나 선생님께 문의하세요.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-70 p-4">
                    <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                        <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h2 className="text-xl font-bold text-slate-800">📝 결과 제출 및 확인 퀴즈</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-3xl leading-none">&times;</button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                            
                            {/* 결과 요약 패널 */}
                            <div className="mb-6 p-5 bg-blue-50 rounded-xl border border-blue-200 shadow-sm">
                                <h3 className="font-bold text-lg mb-3 text-blue-900">📊 나의 실험 결과 (수집된 액체)</h3>
                                <div className="grid grid-cols-3 gap-3 text-center">
                                    {['tube1', 'tube2', 'tube3'].map((t, i) => (
                                        <div key={t} className="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                                            <div className="font-bold text-slate-700 mb-2 border-b pb-1">시험관 {i+1}</div>
                                            <div className="text-sm mb-1"><span className="text-red-500 font-bold">에탄올:</span> {simulationData[t].ethanol.toFixed(1)}</div>
                                            <div className="text-sm"><span className="text-cyan-500 font-bold">물:</span> {simulationData[t].water.toFixed(1)}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div><label className="block text-sm font-bold text-slate-700 mb-1">학번 (필수)</label><input type="text" value={studentId} onChange={e=>setStudentId(e.target.value)} placeholder="예: 2101" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" /></div>
                                <div><label className="block text-sm font-bold text-slate-700 mb-1">이름 (필수)</label><input type="text" value={studentName} onChange={e=>setStudentName(e.target.value)} placeholder="홍길동" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" /></div>
                            </div>
                            <h3 className="font-bold text-lg mb-4 text-slate-800 border-b pb-2">O/X 퀴즈</h3>
                            <div className="space-y-4 mb-6">
                                {questions.map((q, idx) => (
                                    <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                        <p className="font-medium text-slate-800 mb-3">Q{idx + 1}. {q.q}</p>
                                        <div className="flex gap-4">
                                            <button onClick={() => { const newAns=[...answers]; newAns[idx]='O'; setAnswers(newAns); }} className={`flex-1 py-2 font-bold rounded-lg border-2 transition ${answers[idx] === 'O' ? 'bg-blue-500 text-white border-blue-500 shadow' : 'bg-white text-blue-500 border-slate-200 hover:border-blue-300'}`}>O</button>
                                            <button onClick={() => { const newAns=[...answers]; newAns[idx]='X'; setAnswers(newAns); }} className={`flex-1 py-2 font-bold rounded-lg border-2 transition ${answers[idx] === 'X' ? 'bg-red-500 text-white border-red-500 shadow' : 'bg-white text-red-500 border-slate-200 hover:border-red-300'}`}>X</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div>
                                <label className="block font-bold text-slate-700 mb-2">새롭게 알게 된 점 (필수)</label>
                                <textarea value={learnedText} onChange={e=>setLearnedText(e.target.value)} placeholder="힌트: 증류를 이용해 혼합물을 어떻게 분리하는지 적어보세요." className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl h-28 resize-none focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                            </div>
                        </div>
                        <div className="p-5 border-t border-slate-200 flex justify-end gap-3 bg-slate-50">
                            <button onClick={onClose} className="px-6 py-2.5 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 font-medium transition">취소</button>
                            <button onClick={handleSubmit} disabled={isSubmitting} className={`px-8 py-2.5 text-white font-bold rounded-lg shadow-md transition ${isSubmitting ? 'bg-slate-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                {isSubmitting ? '제출 중...' : '제출하기'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 교사용 가이드 모달 ---
        const TeacherModal = ({ onClose, apiUrl, setApiUrl, showAlert }) => {
            const [tempUrl, setTempUrl] = useState(apiUrl);
            const handleSave = () => { setApiUrl(tempUrl); localStorage.setItem('distillation_api_url', tempUrl); showAlert("API 주소가 저장되었습니다.", false, onClose); };
            const scriptCode = `function doPost(e) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();\n  if(sheet.getLastRow() === 0) sheet.appendRow(["시간", "학번", "이름", "최고온도", "소요시간", "관1(에/물)", "관2(에/물)", "관3(에/물)", "퀴즈점수", "알게된점"]);\n  try {\n    var data = JSON.parse(e.postData.contents);\n    sheet.appendRow([new Date(), data.studentId, data.studentName, data.maxTemp, data.duration, data.tube1, data.tube2, data.tube3, data.quizScore, data.learnedText]);\n    return ContentService.createTextOutput("Success").setMimeType(ContentService.MimeType.TEXT);\n  } catch(err) { return ContentService.createTextOutput("Error").setMimeType(ContentService.MimeType.TEXT); }\n}\nfunction doOptions(e) { return ContentService.createTextOutput("").setMimeType(ContentService.MimeType.TEXT); }`;
            const copyCode = () => { navigator.clipboard.writeText(scriptCode).then(() => showAlert("코드 복사가 완료되었습니다.")); };

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900 bg-opacity-70 p-4">
                    <div className="bg-white w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                        <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-100">
                            <h2 className="text-xl font-bold text-slate-800">⚙️ 교사용 연동 가이드</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-3xl leading-none">&times;</button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6 text-sm text-slate-700">
                            <section>
                                <h3 className="font-bold text-lg text-blue-700 mb-2">1. 구글 스프레드시트 설정 및 코드 복사</h3>
                                <p className="mb-2">새 스프레드시트 생성 후 <b>[확장 프로그램] &gt; [Apps Script]</b> 메뉴로 진입하여 기존 코드를 지우고 아래 코드를 붙여넣습니다.</p>
                                <div className="relative">
                                    <textarea readOnly className="w-full h-32 p-4 bg-slate-800 text-green-400 font-mono text-xs rounded-xl mb-2 custom-scrollbar" value={scriptCode}></textarea>
                                    <button onClick={copyCode} className="absolute top-2 right-2 bg-slate-600 text-white px-3 py-1 rounded hover:bg-slate-500 text-xs transition">코드 복사</button>
                                </div>
                            </section>
                            <section>
                                <h3 className="font-bold text-lg text-blue-700 mb-2">2. 배포 및 URL 가져오기</h3>
                                <p>우측 상단 <b>[배포] &gt; [새 배포] &gt; [웹 앱]</b> 선택 후 액세스 권한을 <b>"모든 사용자"</b>로 설정하고 배포합니다. 생성된 웹 앱 URL을 아래에 입력하세요.</p>
                            </section>
                            <section className="bg-blue-50 p-5 rounded-xl border border-blue-200">
                                <h3 className="font-bold text-lg text-blue-900 mb-2">3. 시뮬레이션에 API 주소 적용</h3>
                                <input type="text" value={tempUrl} onChange={e=>setTempUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                            </section>
                        </div>
                        <div className="p-5 border-t border-slate-200 flex justify-end gap-3 bg-white">
                            <button onClick={onClose} className="px-6 py-2.5 text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-100 font-medium transition">닫기</button>
                            <button onClick={handleSave} className="px-8 py-2.5 text-white bg-blue-600 rounded-lg shadow hover:bg-blue-700 font-bold transition">API 주소 저장</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 커스텀 경고/실패 알림창 ---
        const AlertModal = ({ message, isFail, onClose }) => {
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-30 p-4">
                    <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm text-center transform scale-100 transition-transform duration-200">
                        <h2 className="text-2xl font-bold mb-6 text-black">알림</h2>
                        <p className="text-gray-900 font-medium whitespace-pre-line mb-8 text-lg leading-relaxed">
                            {message}
                        </p>
                        <button 
                            onClick={onClose} 
                            className="px-10 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition"
                        >
                            확인
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
